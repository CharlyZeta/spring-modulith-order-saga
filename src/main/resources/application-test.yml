spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${embedded.rabbitmq.host:localhost}
    port: ${embedded.rabbitmq.port:5672}
    username: ${embedded.rabbitmq.username:guest}
    password: ${embedded.rabbitmq.password:guest}

logging:
  level:
    com.showcase.ordersystem: INFO
    org.springframework.modulith: INFO
    org.testcontainers: WARN